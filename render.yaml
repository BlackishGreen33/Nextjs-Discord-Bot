services:
  - type: web
    name: discord-bot-web
    runtime: node
    autoDeployTrigger: off
    buildCommand: corepack enable && corepack prepare pnpm@10.32.1 --activate && pnpm install --frozen-lockfile && pnpm prisma:generate && pnpm build
    preDeployCommand: pnpm prisma:push
    startCommand: ./node_modules/.bin/next start
    envVars:
      - key: NEXT_PUBLIC_APPLICATION_ID
        sync: false
      - key: PUBLIC_KEY
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: REGISTER_COMMANDS_KEY
        generateValue: true
      - key: STORAGE_DRIVER
        value: prisma
      - key: DATABASE_URL
        fromDatabase:
          name: discord-bot-db
          property: connectionString
      - key: MEDIA_MODE
        value: embedded
      - key: GIF_MODE
        value: disabled
      - key: TRANSLATE_PROVIDER
        value: workers-ai

  - type: web
    name: discord-bot-listener
    runtime: node
    plan: standard
    autoDeployTrigger: off
    buildCommand: corepack enable && corepack prepare pnpm@10.32.1 --activate && pnpm install --frozen-lockfile && pnpm prisma:generate
    startCommand: ./node_modules/.bin/tsx worker/gateway-listener/index.ts
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: STORAGE_DRIVER
        value: prisma
      - key: DATABASE_URL
        fromDatabase:
          name: discord-bot-db
          property: connectionString
      - key: MEDIA_MODE
        value: remote
      - key: MEDIA_SERVICE_BASE_URL
        value: https://discord-media-proxy.b-g-59c.workers.dev
      - key: MEDIA_SERVICE_TOKEN
        sync: false
      - key: GIF_MODE
        value: disabled
      - key: TRANSLATE_PROVIDER
        value: workers-ai

databases:
  - name: discord-bot-db
    databaseName: discord_bot
